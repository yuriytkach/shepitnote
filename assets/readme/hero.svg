<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">ShepitNote local-first meeting notes</title>
  <desc id="desc">A dark audio workspace showing separate You and Remote tracks flowing into a reviewed transcript, structured notes, and optional publishing.</desc>
  <rect width="1200" height="420" rx="28" fill="#101417"/>
  <path d="M64 70H1136M64 350H1136" stroke="#354147" stroke-width="2"/>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="64" y="104" fill="#a9b6bc" font-size="20" font-weight="700" letter-spacing="3">LOCAL-FIRST MEETING NOTES / LINUX</text>
    <text x="64" y="172" fill="#f2f5f3" font-size="66" font-weight="750">ShepitNote</text>
    <text x="64" y="216" fill="#c7d1d2" font-size="25">Capture the call. Keep the audio. Review the notes.</text>
    <text x="64" y="254" fill="#819096" font-size="20">Multilingual transcription and controlled publishing for real teams.</text>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700">
      <rect x="64" y="286" width="142" height="38" rx="19" fill="#183d3d"/>
      <text x="85" y="311" fill="#91ded3">ON DEVICE</text>
      <rect x="218" y="286" width="184" height="38" rx="19" fill="#263238"/>
      <text x="239" y="311" fill="#c7d1d2">YOU + REMOTE</text>
    </g>
  </g>
  <g transform="translate(654 64)">
    <rect width="482" height="292" rx="18" fill="#182025" stroke="#405057" stroke-width="2"/>
    <text x="28" y="38" fill="#a9b6bc" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700">MEETING / RECOVERABLE ARTIFACTS</text>
    <g transform="translate(28 64)">
      <text y="20" fill="#91ded3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700">YOU</text>
      <path d="M74 14h13l8-12 9 24 11-19 10 13h14l8-7 8 8h15l9-15 10 21 12-27 10 20h17l9-8 8 10h22" fill="none" stroke="#91ded3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text y="76" fill="#e7b875" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700">REMOTE</text>
      <path d="M98 70h8l8-13 10 24 10-20 11 12h13l8-8 10 11h9l10-20 8 28 11-19 10 12h16l8-10 11 8h20" fill="none" stroke="#e7b875" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <path d="M28 166H454" stroke="#405057" stroke-width="2"/>
    <g transform="translate(28 190)">
      <rect width="205" height="72" rx="10" fill="#223238"/>
      <text x="16" y="29" fill="#91ded3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" font-weight="700">[You] reviewed transcript</text>
      <path d="M16 48h153M16 59h115" stroke="#71868b" stroke-width="5" stroke-linecap="round"/>
      <path d="M248 36h38" stroke="#6e8f8d" stroke-width="3"/>
      <path d="M278 28l10 8-10 8" fill="none" stroke="#6e8f8d" stroke-width="3"/>
      <rect x="300" width="154" height="72" rx="10" fill="#34302a"/>
      <text x="316" y="29" fill="#f0c986" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" font-weight="700">notes.md</text>
      <text x="316" y="54" fill="#c9c4bb" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17">decisions / actions</text>
    </g>
  </g>
</svg>
