<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="350" viewBox="0 0 1200 350" role="img" aria-labelledby="title desc">
  <title id="title">ShepitNote meeting workflow</title>
  <desc id="desc">Five stages move from dual-track capture through local transcription and review to structured notes and optional publishing.</desc>
  <rect width="1200" height="350" rx="28" fill="#f2f0ea"/>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="64" y="67" fill="#263238" font-size="36" font-weight="750">A reviewable path from call to team knowledge</text>
    <text x="64" y="102" fill="#657278" font-size="21">Keep the recoverable record separate from every generated result.</text>
  </g>
  <g transform="translate(64 150)">
    <path d="M166 50H202M384 50H420M602 50H638M820 50H856" stroke="#8b9997" stroke-width="3"/>
    <path d="M194 42l10 8-10 8M412 42l10 8-10 8M630 42l10 8-10 8M848 42l10 8-10 8" fill="none" stroke="#8b9997" stroke-width="3"/>
    <g>
      <rect width="166" height="120" rx="14" fill="#183d3d"/>
      <text x="18" y="34" fill="#91ded3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700">01 / CAPTURE</text>
      <text x="18" y="69" fill="#f4fbf9" font-size="25" font-weight="700">You + Remote</text>
      <text x="18" y="96" fill="#c6ddda" font-size="18">synchronized audio</text>
    </g>
    <g transform="translate(218 0)">
      <rect width="166" height="120" rx="14" fill="#263238"/>
      <text x="18" y="34" fill="#b9c8c8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700">02 / TRANSCRIBE</text>
      <text x="18" y="69" fill="#f4f7f6" font-size="25" font-weight="700">Local speech</text>
      <text x="18" y="96" fill="#c2cdcc" font-size="18">Whisper + glossary</text>
    </g>
    <g transform="translate(436 0)">
      <rect width="166" height="120" rx="14" fill="#34302a"/>
      <text x="18" y="34" fill="#f0c986" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700">03 / REVIEW</text>
      <text x="18" y="69" fill="#fff9ed" font-size="25" font-weight="700">Name speakers</text>
      <text x="18" y="96" fill="#ddd2bc" font-size="18">labels stay editable</text>
    </g>
    <g transform="translate(654 0)">
      <rect width="166" height="120" rx="14" fill="#263238"/>
      <text x="18" y="34" fill="#b9c8c8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700">04 / SUMMARIZE</text>
      <text x="18" y="69" fill="#f4f7f6" font-size="25" font-weight="700">Decide + act</text>
      <text x="18" y="96" fill="#c2cdcc" font-size="18">notes from Ollama</text>
    </g>
    <g transform="translate(872 0)">
      <rect width="166" height="120" rx="14" fill="#183d3d"/>
      <text x="18" y="34" fill="#91ded3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700">05 / PUBLISH</text>
      <text x="18" y="69" fill="#f4fbf9" font-size="25" font-weight="700">Confirm first</text>
      <text x="18" y="96" fill="#c6ddda" font-size="18">Confluence / Slack</text>
    </g>
  </g>
</svg>
